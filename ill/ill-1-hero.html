<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 900px;
  height: 480px;
  overflow: hidden;
}
body {
  background: linear-gradient(135deg, #0f0f12 0%, #1a1520 50%, #0f0f12 100%);
  font-family: 'Inter', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
body::before {
  content: '';
  position: absolute;
  width: 500px; height: 500px;
  top: -200px; left: 50%; transform: translateX(-50%);
  background: radial-gradient(circle, rgba(196,117,90,0.15), transparent 70%);
  border-radius: 50%;
  filter: blur(60px);
}
.center-key {
  position: relative; z-index: 2;
  width: 120px; height: 120px;
  background: linear-gradient(135deg, #d4956e, #c4755a);
  border-radius: 28px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 80px rgba(196,117,90,0.3);
}
.center-key svg { width: 56px; height: 56px; color: white; }
.orbit {
  position: absolute;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 50%;
}
.orbit:nth-child(2) { width: 300px; height: 300px; }
.orbit:nth-child(3) { width: 450px; height: 450px; }
.orbit:nth-child(4) { width: 600px; height: 600px; }
.node {
  position: absolute;
  width: 56px; height: 56px;
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: white;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  z-index: 2;
}
.node.anthropic { background: linear-gradient(135deg, #d4956e, #c4755a); }
.node.openai { background: linear-gradient(135deg, #2a2a2a, #4a4a4a); }
.node.google { background: linear-gradient(135deg, #4285f4, #34a853); }
.node.deepseek { background: linear-gradient(135deg, #2563eb, #6366f1); }
.node.qwen { background: linear-gradient(135deg, #7c3aed, #a855f7); }
.node.mistral { background: linear-gradient(135deg, #f59e0b, #ef4444); }
.n1 { top: 80px; left: 50%; transform: translateX(-50%); }
.n2 { top: 50%; right: 60px; transform: translateY(-50%); }
.n3 { bottom: 80px; left: 50%; transform: translateX(-50%); }
.n4 { top: 50%; left: 60px; transform: translateY(-50%); }
.n5 { top: 40px; right: 120px; }
.n6 { bottom: 40px; right: 120px; }
.n7 { bottom: 40px; left: 120px; }
.n8 { top: 40px; left: 120px; }
</style>
</head>
<body>

<div class="center-key">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
    <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3-3.5 3.5"/>
  </svg>
</div>
<div class="orbit"></div>
<div class="orbit"></div>
<div class="orbit"></div>

<div class="node anthropic n1">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L2 19h20L12 2zm0 4l7.53 13H4.47L12 6z"/></svg>
</div>
<div class="node openai n2">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M22.28 11.24a8.14 8.14 0 0 0-1.21-1.53 9.53 9.53 0 0 0-1.34-1.15L18.27 7.5l1.46-1.46a.57.57 0 0 0 0-.8l-2-2a.57.57 0 0 0-.8 0L15.47 4.7l-1.06-1.47a9.53 9.53 0 0 0-1.15-1.34A8.14 8.14 0 0 0 11.74.69a10.12 10.12 0 0 0-3.48 0 8.14 8.14 0 0 0-1.53 1.21 9.53 9.53 0 0 0-1.15 1.34L4.53 4.7l-1.46-1.46a.57.57 0 0 0-.8 0l-2 2a.57.57 0 0 0 0 .8L1.73 7.5.27 8.96A9.53 9.53 0 0 0-.88 10.1a8.14 8.14 0 0 0-1.21 1.53 10.12 10.12 0 0 0 0 3.48 8.14 8.14 0 0 0 1.21 1.53 9.53 9.53 0 0 0 1.15 1.34l1.46 1.06-1.46 1.46a.57.57 0 0 0 0 .8l2 2a.57.57 0 0 0 .8 0l1.46-1.46 1.06 1.46a9.53 9.53 0 0 0 1.34 1.15 8.14 8.14 0 0 0 1.53 1.21 10.12 10.12 0 0 0 3.48 0 8.14 8.14 0 0 0 1.53-1.21 9.53 9.53 0 0 0 1.34-1.15l1.06-1.46 1.46 1.46a.57.57 0 0 0 .8 0l2-2a.57.57 0 0 0 0-.8l-1.46-1.46 1.46-1.06a9.53 9.53 0 0 0 1.15-1.34 8.14 8.14 0 0 0 1.21-1.53 10.12 10.12 0 0 0 0-3.48zM12 18.5a6.5 6.5 0 1 1 6.5-6.5 6.5 6.5 0 0 1-6.5 6.5z"/></svg>
</div>
<div class="node google n3">G</div>
<div class="node deepseek n4">D</div>
<div class="node qwen n5">Q</div>
<div class="node mistral n6">M</div>
<div class="node anthropic n7" style="font-size:10px;">C</div>
<div class="node openai n8" style="font-size:10px;">O</div>
</body>
</html>
