<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 900px; height: 400px; overflow: hidden; }
body {
  background: #13131a;
  font-family: 'Inter', sans-serif;
  padding: 32px 40px;
  display: flex;
  flex-direction: column;
}
.arch-user {
  width: 72px; height: 72px; border-radius: 18px;
  background: linear-gradient(135deg, #2a2a3e, #1e1e30);
  border: 1px solid rgba(255,255,255,0.1);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.arch-user svg { width: 28px; height: 28px; color: rgba(255,255,255,0.5); margin-bottom: 4px; }
.arch-user span { font-size: 9px; color: rgba(255,255,255,0.3); }
.arch-connector { position: relative; }
.arch-connector.dashed {
  width: 80px; height: 2px; flex: none;
  background: repeating-linear-gradient(90deg, rgba(255,255,255,0.1) 0, rgba(255,255,255,0.1) 8px, transparent 8px, transparent 16px);
}
.arch-connector.solid {
  width: 80px; height: 2px; flex: none;
  background: linear-gradient(90deg, rgba(196,117,90,0.6), rgba(196,117,90,0.2));
}
.arch-tag {
  position: absolute; top: -20px; left: 50%; transform: translateX(-50%);
  font-size: 10px; font-weight: 500; white-space: nowrap;
}
.arch-connector.dashed .arch-tag { color: rgba(239,68,68,0.7); }
.arch-connector.solid .arch-tag { color: rgba(196,117,90,0.8); }
.arch-m-box {
  padding: 8px 14px; border-radius: 8px;
  font-size: 10px; font-weight: 600; color: white;
  display: inline-flex; align-items: center; gap: 5px;
}
.arch-m-box.a { background: linear-gradient(135deg, #d4956e, #c4755a); }
.arch-m-box.o { background: linear-gradient(135deg, #2a2a2a, #4a4a4a); }
.arch-m-box.g { background: linear-gradient(135deg, #4285f4, #34a853); }
.arch-m-box.d { background: linear-gradient(135deg, #2563eb, #6366f1); }
.arch-m-box.q { background: linear-gradient(135deg, #7c3aed, #a855f7); }
.arch-m-box.m { background: linear-gradient(135deg, #f59e0b, #ef4444); }
.arch-relay {
  width: 80px; height: 80px; border-radius: 20px;
  background: linear-gradient(135deg, rgba(196,117,90,0.2), rgba(196,117,90,0.05));
  border: 1px solid rgba(196,117,90,0.3);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.arch-relay svg { width: 28px; height: 28px; color: #c4755a; margin-bottom: 4px; }
.arch-relay span { font-size: 9px; color: rgba(196,117,90,0.7); font-weight: 600; }
</style>
</head>
<body>

<!-- BEFORE -->
<div style="font-size:13px; font-weight:600; color:rgba(255,255,255,0.4); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:16px;">Before: 分散接入</div>
<div style="flex:1; display:flex; align-items:center; gap:16px;">
  <div class="arch-user">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span>开发者</span>
  </div>
  <div style="flex:1; display:flex; flex-direction:column; gap:8px;">
    <div style="display:flex; align-items:center; gap:8px;">
      <div class="arch-connector dashed">
        <span class="arch-tag" style="color:rgba(239,68,68,0.7);">绑卡+翻墙</span>
      </div>
      <div class="arch-m-box a">Anthropic API</div>
    </div>
    <div style="display:flex; align-items:center; gap:8px;">
      <div class="arch-connector dashed">
        <span class="arch-tag" style="color:rgba(239,68,68,0.7);">海外卡</span>
      </div>
      <div class="arch-m-box o">OpenAI API</div>
    </div>
    <div style="display:flex; align-items:center; gap:8px;">
      <div class="arch-connector dashed">
        <span class="arch-tag" style="color:rgba(239,68,68,0.7);">注册困难</span>
      </div>
      <div class="arch-m-box g">Google AI API</div>
    </div>
    <div style="display:flex; align-items:center; gap:8px;">
      <div class="arch-connector dashed">
        <span class="arch-tag" style="color:rgba(239,68,68,0.7);">多 Key</span>
      </div>
      <div class="arch-m-box d">DeepSeek / Qwen</div>
    </div>
  </div>
</div>

<!-- AFTER -->
<div style="font-size:13px; font-weight:600; color:rgba(196,117,90,0.6); text-transform:uppercase; letter-spacing:0.1em; margin-top:24px; margin-bottom:16px;">After: ModelSet 统一接入</div>
<div style="flex:1; display:flex; align-items:center; gap:16px;">
  <div class="arch-user">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span>开发者</span>
  </div>
  <div class="arch-connector solid">
    <span class="arch-tag">1 个 Key</span>
  </div>
  <div class="arch-relay">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
    <span>ModelSet</span>
  </div>
  <div class="arch-connector solid">
    <span class="arch-tag">官方转发</span>
  </div>
  <div style="flex:1; display:flex; flex-wrap:wrap; gap:8px; align-items:center; justify-content:center;">
    <div class="arch-m-box a">Claude</div>
    <div class="arch-m-box o">GPT</div>
    <div class="arch-m-box g">Gemini</div>
    <div class="arch-m-box d">DeepSeek</div>
    <div class="arch-m-box q">Qwen</div>
    <div class="arch-m-box m">Mistral</div>
  </div>
</div>
</body>
</html>
