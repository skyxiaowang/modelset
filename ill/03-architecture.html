<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #13131a;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
  font-family: 'Inter', sans-serif;
  padding: 32px;
}
.container {
  width: 900px;
  background: #13131a;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.06);
  padding: 32px 40px;
}
.section-label { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 20px; }
.section-label.before { color: rgba(255,255,255,0.4); }
.section-label.after { color: rgba(196,117,90,0.6); }
.row { display: flex; align-items: center; gap: 16px; }
.user {
  width: 72px; height: 72px; border-radius: 18px; flex-shrink: 0;
  background: linear-gradient(135deg, #2a2a3e, #1e1e30);
  border: 1px solid rgba(255,255,255,0.1);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.user svg { width: 28px; height: 28px; stroke: rgba(255,255,255,0.5); }
.user span { font-size: 9px; color: rgba(255,255,255,0.3); margin-top: 4px; }
.cols { flex: 1; display: flex; flex-direction: column; gap: 12px; }
.col-row { display: flex; align-items: center; gap: 8px; }
.dashed-line {
  width: 80px; height: 2px; flex: none; position: relative;
  background: repeating-linear-gradient(90deg, rgba(255,255,255,0.1) 0, rgba(255,255,255,0.1) 8px, transparent 8px, transparent 16px);
}
.dashed-line .tag {
  position: absolute; top: -18px; left: 50%; transform: translateX(-50%);
  font-size: 10px; color: rgba(239,68,68,0.7); white-space: nowrap;
}
.solid-line {
  width: 80px; height: 2px; flex: none; position: relative;
  background: linear-gradient(90deg, rgba(196,117,90,0.6), rgba(196,117,90,0.2));
}
.solid-line .tag {
  position: absolute; top: -18px; left: 50%; transform: translateX(-50%);
  font-size: 10px; color: rgba(196,117,90,0.8); white-space: nowrap;
}
.m-box {
  padding: 8px 14px; border-radius: 8px;
  font-size: 10px; font-weight: 600; color: white;
}
.m-box.a { background: linear-gradient(135deg, #d4956e, #c4755a); }
.m-box.o { background: linear-gradient(135deg, #2a2a2a, #4a4a4a); }
.m-box.g { background: linear-gradient(135deg, #4285f4, #34a853); }
.m-box.d { background: linear-gradient(135deg, #2563eb, #6366f1); }
.m-box.q { background: linear-gradient(135deg, #7c3aed, #a855f7); }
.m-box.m { background: linear-gradient(135deg, #f59e0b, #ef4444); }
.relay {
  width: 80px; height: 80px; border-radius: 20px; flex-shrink: 0;
  background: linear-gradient(135deg, rgba(196,117,90,0.2), rgba(196,117,90,0.05));
  border: 1px solid rgba(196,117,90,0.3);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.relay svg { width: 28px; height: 28px; stroke: #c4755a; }
.relay span { font-size: 9px; color: rgba(196,117,90,0.7); font-weight: 600; margin-top: 4px; }
.models-row { flex: 1; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; justify-content: center; }
.divider { border-top: 1px solid rgba(255,255,255,0.06); margin: 28px 0; }
</style>
</head>
<body>
<div class="container">
  <!-- BEFORE -->
  <div class="section-label before">Before：分散接入</div>
  <div class="row">
    <div class="user">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>开发者</span>
    </div>
    <div class="cols">
      <div class="col-row"><div class="dashed-line"><span class="tag">绑卡+翻墙</span></div><div class="m-box a">Anthropic API</div></div>
      <div class="col-row"><div class="dashed-line"><span class="tag">海外卡</span></div><div class="m-box o">OpenAI API</div></div>
      <div class="col-row"><div class="dashed-line"><span class="tag">注册困难</span></div><div class="m-box g">Google AI API</div></div>
      <div class="col-row"><div class="dashed-line"><span class="tag">多 Key 管理</span></div><div class="m-box d">DeepSeek / Qwen</div></div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- AFTER -->
  <div class="section-label after">After：ModelSet 统一接入</div>
  <div class="row">
    <div class="user">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>开发者</span>
    </div>
    <div class="solid-line"><span class="tag">1 个 Key</span></div>
    <div class="relay">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      <span>ModelSet</span>
    </div>
    <div class="solid-line"><span class="tag">官方转发</span></div>
    <div class="models-row">
      <div class="m-box a">Claude</div>
      <div class="m-box o">GPT</div>
      <div class="m-box g">Gemini</div>
      <div class="m-box d">DeepSeek</div>
      <div class="m-box q">Qwen</div>
      <div class="m-box m">Mistral</div>
    </div>
  </div>
</div>
</body>
</html>
