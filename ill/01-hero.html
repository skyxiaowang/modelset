<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: linear-gradient(135deg, #0f0f12 0%, #1a1520 50%, #0f0f12 100%);
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
  font-family: 'Inter', sans-serif;
  padding: 48px;
}
.container {
  width: 900px;
  border-radius: 16px;
  padding: 48px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.container::before {
  content: '';
  position: absolute;
  width: 500px; height: 500px;
  top: -200px; left: 50%; transform: translateX(-50%);
  background: radial-gradient(circle, rgba(196,117,90,0.15), transparent 70%);
  border-radius: 50%;
  filter: blur(60px);
}
.content { position: relative; z-index: 1; }
.key-icon {
  width: 100px; height: 100px; border-radius: 24px;
  background: linear-gradient(135deg, #d4956e, #c4755a);
  display: inline-flex; align-items: center; justify-content: center;
  box-shadow: 0 0 80px rgba(196,117,90,0.3);
  margin-bottom: 24px;
}
.key-icon svg { width: 48px; height: 48px; stroke: white; }
.nodes { display: flex; justify-content: center; gap: 24px; flex-wrap: wrap; position: relative; z-index: 1; }
.node {
  width: 52px; height: 52px; border-radius: 14px;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; color: white;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.node.a { background: linear-gradient(135deg, #d4956e, #c4755a); }
.node.o { background: linear-gradient(135deg, #2a2a2a, #4a4a4a); }
.node.g { background: linear-gradient(135deg, #4285f4, #34a853); }
.node.d { background: linear-gradient(135deg, #2563eb, #6366f1); }
.node.q { background: linear-gradient(135deg, #7c3aed, #a855f7); }
.node.m { background: linear-gradient(135deg, #f59e0b, #ef4444); }
.subtitle {
  margin-top: 20px;
  font-size: 13px; color: rgba(255,255,255,0.4); letter-spacing: 0.05em;
}
</style>
</head>
<body>
<div class="container">
  <div class="content">
    <div class="key-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 11-7.778 7.778 5.5 5.5 0 017.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3-3.5 3.5"/>
      </svg>
    </div>
    <div class="nodes">
      <div class="node a">A</div>
      <div class="node o">O</div>
      <div class="node g">G</div>
      <div class="node d">D</div>
      <div class="node q">Q</div>
      <div class="node m">M</div>
    </div>
    <div class="subtitle">一个 API Key · 全部模型 · 统一调用</div>
  </div>
</div>
</body>
</html>
