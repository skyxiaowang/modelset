<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 900px; height: 240px; overflow: hidden; }
body {
  background: #13131a;
  font-family: 'Inter', sans-serif;
  padding: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 32px;
}
.ref-card {
  flex: 1;
  max-width: 300px;
  text-align: center;
  padding: 28px 20px;
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 16px;
  position: relative;
  overflow: hidden;
}
.ref-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, #c4755a, transparent);
}
.ref-label {
  font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.4);
  margin-bottom: 12px;
}
.ref-amount {
  font-size: 40px; font-weight: 900; color: #c4755a;
  font-family: 'JetBrains Mono', monospace;
  line-height: 1;
}
.ref-unit { font-size: 12px; color: rgba(255,255,255,0.3); margin-top: 6px; }
.ref-arrow {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  color: rgba(196,117,90,0.5);
}
.ref-arrow svg { width: 32px; height: 32px; }
.ref-arrow span { font-size: 10px; }
</style>
</head>
<body>

<div class="ref-card">
  <div class="ref-label">邀请人获得</div>
  <div class="ref-amount">500万</div>
  <div class="ref-unit">tokens 额度 / 人</div>
</div>
<div class="ref-arrow">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
  <span>双方同时到账</span>
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
</div>
<div class="ref-card">
  <div class="ref-label">新用户获得</div>
  <div class="ref-amount" style="font-size:32px; color:rgba(196,117,90,0.7);">50万</div>
  <div class="ref-unit">tokens 额度</div>
</div>
</body>
</html>
