<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 900px; height: 360px; overflow: hidden; }
body {
  background: #13131a;
  font-family: 'Inter', sans-serif;
  padding: 40px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
}
.pain-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 24px 20px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.pain-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
}
.pain-card:nth-child(1)::before { background: #ef4444; }
.pain-card:nth-child(2)::before { background: #f59e0b; }
.pain-card:nth-child(3)::before { background: #a855f7; }
.pain-card:nth-child(4)::before { background: #3b82f6; }
.pain-icon {
  width: 48px; height: 48px; border-radius: 12px;
  margin: 0 auto 16px;
  display: flex; align-items: center; justify-content: center;
}
.pain-icon svg { width: 24px; height: 24px; }
.pain-card:nth-child(1) .pain-icon { background: rgba(239,68,68,0.1); color: #ef4444; }
.pain-card:nth-child(2) .pain-icon { background: rgba(245,158,11,0.1); color: #f59e0b; }
.pain-card:nth-child(3) .pain-icon { background: rgba(168,85,247,0.1); color: #a855f7; }
.pain-card:nth-child(4) .pain-icon { background: rgba(59,130,246,0.1); color: #3b82f6; }
.pain-title { font-size: 16px; font-weight: 700; color: #e0e0e0; margin-bottom: 8px; }
.pain-desc { font-size: 12px; color: rgba(255,255,255,0.4); line-height: 1.6; }
</style>
</head>
<body>

<div class="pain-card">
  <div class="pain-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
      <line x1="12" y1="16" x2="12" y2="12" stroke-width="3"/>
    </svg>
  </div>
  <div class="pain-title">绑卡难</div>
  <div class="pain-desc">海外信用卡、虚拟卡<br>随时风控，Key 作废</div>
</div>
<div class="pain-card">
  <div class="pain-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83"/>
    </svg>
  </div>
  <div class="pain-title">网络抖</div>
  <div class="pain-desc">直连境外，时高时低<br>流式响应易断</div>
</div>
<div class="pain-card">
  <div class="pain-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/>
    </svg>
  </div>
  <div class="pain-title">价格贵</div>
  <div class="pain-desc">Opus $15/M tokens<br>重度使用账单高</div>
</div>
<div class="pain-card">
  <div class="pain-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
    </svg>
  </div>
  <div class="pain-title">限速严</div>
  <div class="pain-desc">免费 tier 经常触发<br>升级流程繁琐</div>
</div>
</body>
</html>
