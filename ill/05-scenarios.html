<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #13131a;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
  font-family: 'Inter', sans-serif;
  padding: 32px;
}
.container {
  width: 900px;
  background: #13131a;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.06);
  padding: 32px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}
.card {
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 14px;
  padding: 24px;
  position: relative;
}
.card::after {
  content: '';
  position: absolute; bottom: 0; left: 24px; right: 24px; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(196,117,90,0.3), transparent);
}
.avatar {
  width: 44px; height: 44px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 14px;
}
.avatar svg { width: 22px; height: 22px; stroke: white; }
.card:nth-child(1) .avatar { background: linear-gradient(135deg, #2563eb, #6366f1); }
.card:nth-child(2) .avatar { background: linear-gradient(135deg, #c4755a, #d4956e); }
.card:nth-child(3) .avatar { background: linear-gradient(135deg, #10b981, #34d399); }
.name { font-size: 14px; font-weight: 700; color: #e0e0e0; margin-bottom: 4px; }
.role { font-size: 11px; color: rgba(255,255,255,0.3); margin-bottom: 14px; }
.stat { display: flex; align-items: baseline; gap: 4px; margin-bottom: 4px; }
.val { font-size: 22px; font-weight: 900; color: #c4755a; font-family: 'JetBrains Mono', monospace; }
.unit { font-size: 11px; color: rgba(255,255,255,0.3); }
.desc { font-size: 11px; color: rgba(255,255,255,0.4); line-height: 1.6; }
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="avatar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
    </div>
    <div class="name">独立开发者</div>
    <div class="role">同时用 Claude Code + Cursor</div>
    <div class="stat"><span class="val">~¥50</span><span class="unit">/月</span></div>
    <div class="desc">从 $100+/月降到几十块，一个 Key 全搞定</div>
  </div>
  <div class="card">
    <div class="avatar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
    </div>
    <div class="name">创业团队</div>
    <div class="role">5 人团队，多模型测试</div>
    <div class="stat"><span class="val">1 平台</span><span class="unit">统一管理</span></div>
    <div class="desc">共用一个平台，账单清晰，不用各自折腾</div>
  </div>
  <div class="card">
    <div class="avatar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c0 1.66 2.69 3 6 3s6-1.34 6-3v-5"/></svg>
    </div>
    <div class="name">学生党</div>
    <div class="role">预算有限，学习 + 项目</div>
    <div class="stat"><span class="val">500万</span><span class="unit">免费额度</span></div>
    <div class="desc">邀请活动拿额度 + 低价，日常学习够用</div>
  </div>
</div>
</body>
</html>
