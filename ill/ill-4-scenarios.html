<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 900px; height: 320px; overflow: hidden; }
body {
  background: #13131a;
  font-family: 'Inter', sans-serif;
  padding: 32px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}
.sc-card {
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 14px;
  padding: 24px;
  position: relative;
}
.sc-card::after {
  content: '';
  position: absolute; bottom: 0; left: 24px; right: 24px; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(196,117,90,0.3), transparent);
}
.sc-avatar {
  width: 44px; height: 44px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 14px;
}
.sc-avatar svg { width: 22px; height: 22px; }
.sc-card:nth-child(1) .sc-avatar { background: linear-gradient(135deg, #2563eb, #6366f1); color: white; }
.sc-card:nth-child(2) .sc-avatar { background: linear-gradient(135deg, #c4755a, #d4956e); color: white; }
.sc-card:nth-child(3) .sc-avatar { background: linear-gradient(135deg, #10b981, #34d399); color: white; }
.sc-name { font-size: 14px; font-weight: 700; color: #e0e0e0; margin-bottom: 4px; }
.sc-role { font-size: 11px; color: rgba(255,255,255,0.3); margin-bottom: 14px; }
.sc-stat { display: flex; align-items: baseline; gap: 4px; margin-bottom: 4px; }
.sc-val {
  font-size: 22px; font-weight: 900; color: #c4755a;
  font-family: 'JetBrains Mono', monospace;
}
.sc-unit { font-size: 11px; color: rgba(255,255,255,0.3); }
.sc-desc { font-size: 11px; color: rgba(255,255,255,0.4); line-height: 1.6; }
</style>
</head>
<body>

<div class="sc-card">
  <div class="sc-avatar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
  </div>
  <div class="sc-name">独立开发者</div>
  <div class="sc-role">同时用 Claude Code + Cursor</div>
  <div class="sc-stat">
    <span class="sc-val">~¥50</span>
    <span class="sc-unit">/月</span>
  </div>
  <div class="sc-desc">从 $100+/月降到几十块人民币，一个 Key 全搞定</div>
</div>
<div class="sc-card">
  <div class="sc-avatar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
  </div>
  <div class="sc-name">创业团队</div>
  <div class="sc-role">5 人团队，多模型测试</div>
  <div class="sc-stat">
    <span class="sc-val">1 平台</span>
    <span class="sc-unit">统一管理</span>
  </div>
  <div class="sc-desc">共用一个平台，账单清晰，不用每人各自折腾</div>
</div>
<div class="sc-card">
  <div class="sc-avatar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c0 1.66 2.69 3 6 3s6-1.34 6-3v-5"/></svg>
  </div>
  <div class="sc-name">学生党</div>
  <div class="sc-role">预算有限，学习 + 项目</div>
  <div class="sc-stat">
    <span class="sc-val">500万</span>
    <span class="sc-unit">token 免费额度</span>
  </div>
  <div class="sc-desc">邀请活动拿额度 + 低价，日常学习够用了</div>
</div>
</body>
</html>
