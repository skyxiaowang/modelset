<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0f0f12;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
  font-family: 'Inter', sans-serif;
  padding: 48px;
}
.container {
  width: 900px;
  background: #13131a;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.06);
  padding: 40px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
}
.card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 24px 20px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
}
.card:nth-child(1)::before { background: #ef4444; }
.card:nth-child(2)::before { background: #f59e0b; }
.card:nth-child(3)::before { background: #a855f7; }
.card:nth-child(4)::before { background: #3b82f6; }
.icon {
  width: 48px; height: 48px; border-radius: 12px;
  margin: 0 auto 16px;
  display: flex; align-items: center; justify-content: center;
}
.icon svg { width: 24px; height: 24px; }
.card:nth-child(1) .icon { background: rgba(239,68,68,0.1); }
.card:nth-child(1) .icon svg { stroke: #ef4444; }
.card:nth-child(2) .icon { background: rgba(245,158,11,0.1); }
.card:nth-child(2) .icon svg { stroke: #f59e0b; }
.card:nth-child(3) .icon { background: rgba(168,85,247,0.1); }
.card:nth-child(3) .icon svg { stroke: #a855f7; }
.card:nth-child(4) .icon { background: rgba(59,130,246,0.1); }
.card:nth-child(4) .icon svg { stroke: #3b82f6; }
.title { font-size: 16px; font-weight: 700; color: #e0e0e0; margin-bottom: 8px; }
.desc { font-size: 12px; color: rgba(255,255,255,0.4); line-height: 1.6; }
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/><line x1="12" y1="16" x2="12" y2="12" stroke-width="3"/></svg></div>
    <div class="title">绑卡难</div>
    <div class="desc">海外信用卡、虚拟卡<br>随时风控，Key 作废</div>
  </div>
  <div class="card">
    <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83"/></svg></div>
    <div class="title">网络抖</div>
    <div class="desc">直连境外，时高时低<br>流式响应易断</div>
  </div>
  <div class="card">
    <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg></div>
    <div class="title">价格贵</div>
    <div class="desc">Opus $15/M tokens<br>重度使用账单高</div>
  </div>
  <div class="card">
    <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
    <div class="title">限速严</div>
    <div class="desc">免费 tier 经常触发<br>升级流程繁琐</div>
  </div>
</div>
</body>
</html>
